<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Iconic Moments - World Cup History</title>
     <style>
         :root {
             --gold: #d4af37;
             --navy: #0a192f;
             --white: #ffffff;
         }

         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
             font-family: 'Inter', sans-serif;
         }

         body {
             background: var(--navy);
             color: white;
             line-height: 1.6;
         }

         .header {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             padding: 1.3rem 10%;
             display: flex;
             justify-content: space-between;
             align-items: center;
             z-index: 100;
             background: rgba(10, 25, 47, 0.85);
             backdrop-filter: blur(10px);
             border-bottom: 1px solid rgba(212, 175, 55, 0.2);
         }

         .logo {
             font-size: 1.5rem;
             color: var(--white);
             text-decoration: none;
             font-weight: 700;
             letter-spacing: 1px;
         }

         .logo span { color: var(--gold); }

         .navbar { display: flex; }

         .navbar a {
             font-size: 1rem;
             color: var(--white);
             text-decoration: none;
             font-weight: 500;
             margin-left: 2.5rem;
             position: relative;
             transition: .3s;
         }

         .navbar a:hover, .navbar a.active { color: var(--gold); }

         main {
             padding: 120px 10% 50px;
             max-width: 1200px;
             margin: 0 auto;
         }

         section {
             background: rgba(255, 255, 255, 0.05);
             padding: 30px;
             border-radius: 15px;
             border-left: 5px solid var(--gold);
         }

         h2 {
             color: var(--gold);
             margin-bottom: 15px;
             font-size: 2rem;
         }

             position: relative;
             width: 100%;
             padding-bottom: 56.25%;
             height: 0;
             margin-top: 20px;
             overflow: hidden;
             border-radius: 10px;
         }

         .video-container iframe {
             position: absolute;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             border: none;
         }
